<div class="letter">
  <div class="letter-header"></div>

  <div class="letter-body">
    <div class="message-container">
      <div class="message-text" *ngIf="message">
        <p *ngFor="let paragraph of message.message" class="message-paragraph">
          {{ paragraph }}
        </p>
      </div>
    </div>
  </div>

  <div class="letter-footer">
    <button class="save-btn">Kaydet</button>

    <button class="close-btn">Kapat</button>
  </div>
</div>
